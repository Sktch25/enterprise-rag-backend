<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise RAG Intelligence</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; height: 85vh; }
        .chat-header { background: #0f172a; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        
        .upload-area { background: #e2e8f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #cbd5e1; font-size: 0.9rem;}
        .upload-area input[type="file"] { font-size: 0.9rem; }
        .upload-btn { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .upload-btn:hover { background: #059669; }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-msg { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0; }
        .system-msg { background: #dcfce7; color: #166534; align-self: center; font-size: 0.85rem; text-align: center; max-width: 90%; border-radius: 20px; padding: 8px 16px; }
        
        .input-area { display: flex; padding: 15px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 1rem; }
        input[type="text"]:focus { border-color: #2563eb; }
        button { background: #2563eb; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .loading { font-style: italic; color: #64748b; font-size: 0.9rem; align-self: flex-start; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">📄 Document Intelligence Engine</div>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf">
        <button class="upload-btn" onclick="uploadFile()">Upload PDF</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-msg">Hello! I am connected to your local vector database. Ask me anything about the active document, or upload a new one above.</div>
        <div class="loading" id="loadingIndicator">Processing...</div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Type your question here..." onkeypress="handleKeyPress(event)">
        <button onclick="askQuestion()">Send</button>
    </div>
</div>

<script>
    // --- NEW UPLOAD LOGIC ---
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Please select a PDF file first.");
            return;
        }

        // Create a form data object to send the file
        const formData = new FormData();
        formData.append("file", file);

        appendMessage(`Uploading ${file.name}...`, 'system-msg');

        try {
            const response = await fetch('http://127.0.0.1:8000/api/upload', {
                method: 'POST',
                body: formData // fetch automatically sets the correct headers for FormData
            });

            const data = await response.json();

            if (response.ok) {
                appendMessage(`✅ Success: ${data.message}`, 'system-msg');
                fileInput.value = ""; // Clear the file input
            } else {
                appendMessage(`❌ Error: ${data.detail}`, 'system-msg');
            }

        } catch (error) {
            appendMessage("❌ Error: Could not connect to the backend API.", 'system-msg');
        }
    }

    // --- EXISTING QUERY LOGIC ---
    async function askQuestion() {
        const inputField = document.getElementById('questionInput');
        const chatBox = document.getElementById('chatBox');
        const loading = document.getElementById('loadingIndicator');
        const question = inputField.value.trim();

        if (!question) return;

        appendMessage(question, 'user-msg');
        inputField.value = '';
        
        chatBox.appendChild(loading);
        loading.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('http://127.0.0.1:8000/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            if (!response.ok) throw new Error("API Error");

            const data = await response.json();
            
            loading.style.display = 'none';
            appendMessage(data.answer, 'ai-msg');

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Error: Could not connect to the backend API.", 'ai-msg');
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.insertBefore(msgDiv, document.getElementById('loadingIndicator'));
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') askQuestion();
    }
</script>

</body>
</html>
